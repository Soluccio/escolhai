name: Validar catalogo Escolhai
on:
  workflow_dispatch:
  push:
    paths:
      - products.json
      - index.html
      - produtos.html
      - styles.css
      - app.js
permissions:
  contents: read
jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_site.py
