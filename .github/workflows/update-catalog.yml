name: Atualizar catalogo Escolhai

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar integracao com a Shopee
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
        run: python scripts/sync_shopee.py

      - name: Gerar o site
        run: python scripts/build_site.py

      - name: Salvar alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html products.json images/
          git diff --cached --quiet || git commit -m "Atualiza catalogo Escolhai"
          git push
