<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <!-- Cache control para evitar versões antigas -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Escolhaí</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%237B1E2B'/%3E%3Ctext x='50' y='68' font-size='60' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --wine-700: #7B1E2B; --wine-600: #9B2D3D; --wine-500: #B83A4C; --gold: #D4A574; }
    [data-theme="dark"] { --bg: #14090C; --text: #F8F0F0; --text-secondary: #C9B5B8; --border: #3A1F25; --bg-card: #251418; }
    [data-theme="light"] { --bg: #FBF5F5; --text: #2A0F14; --text-secondary: #5A3A40; --border: #EAD8DA; --bg-card: #FFFFFF; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: grid; place-items: center; padding: 2rem; text-align: center; }
    .error-box { max-width: 500px; }
    .error-code { font-family: 'Poppins', sans-serif; font-size: clamp(5rem, 18vw, 9rem); font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--wine-700), var(--gold)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin-bottom: 1rem; }
    h1 { font-family: 'Poppins', sans-serif; font-size: 1.5rem; margin-bottom: 0.8rem; }
    p { color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.05rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, var(--wine-700), var(--wine-500)); color: #fff; padding: 0.9rem 1.8rem; border-radius: 8px; font-weight: 600; text-decoration: none; transition: transform 0.3s, box-shadow 0.3s; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(123, 30, 43, 0.4); }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">404</div>
    <h1>Esta página saiu de vitrine</h1>
    <p>O link que você acessou não existe ou foi movido. Que tal voltar ao catálogo e encontrar algo interessante?</p>
    <a href="index.html?v=4" class="btn">← Voltar para a Escolhaí</a>
  </div>
</body>
</html>
