<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Escolhaí — Administrar produtos</title><style>:root{--w:#26070e;--a:#68172c;--bg:#f8f3f4}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:#2c1117}header{background:var(--w);color:#fff;padding:25px}main{max-width:1200px;margin:auto;padding:25px;display:grid;grid-template-columns:380px 1fr;gap:25px}.panel{background:#fff;padding:22px;border-radius:18px;box-shadow:0 8px 28px #26070e18}label{display:grid;gap:5px;font-weight:700;font-size:13px;margin:10px 0}input,textarea,select{width:100%;padding:11px;border:1px solid #decbd0;border-radius:10px;font:inherit}textarea{min-height:75px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}button,.file{border:0;background:var(--w);color:#fff;padding:11px 14px;border-radius:10px;font-weight:800;cursor:pointer}.secondary{background:#fff;color:var(--w);border:1px solid #decbd0}.list{display:grid;gap:10px}.item{padding:15px;border:1px solid #eadde1;border-radius:13px;display:flex;justify-content:space-between;gap:12px}.item small{color:#75636a}.notice{background:#f3e3e7;padding:12px;border-radius:10px;font-size:12px;line-height:1.5}@media(max-width:850px){main{grid-template-columns:1fr}}</style></head><body><header><h1>Escolhaí — Administrar produtos</h1><p>Editor local. Nenhum dado é enviado para a internet.</p></header><main><section class="panel"><div class="notice">1. Importe o <b>products.json</b>. 2. Edite os produtos. 3. Exporte o novo JSON. 4. Substitua no GitHub e execute o workflow.</div><div class="btns"><label class="file">Importar JSON<input id="file" type="file" accept=".json" hidden></label><button id="export">Exportar JSON</button><button class="secondary" id="new">Novo</button></div><form id="form"><input id="id" type="hidden"><label>Nome<input id="name" required></label><label>Descrição<textarea id="description"></textarea></label><label>Categoria<input id="category" required></label><div class="row"><label>Preço atual<input id="price" type="number" step="0.01"></label><label>Preço anterior<input id="oldPrice" type="number" step="0.01"></label></div><div class="row"><label>Avaliação<input id="rating" type="number" step="0.1" min="0" max="5"></label><label>Ordem<input id="order" type="number"></label></div><label>Etiqueta<input id="badge"></label><label>Imagem<input id="image" placeholder="images/produto.jpg"></label><label>Link Shopee<input id="link"></label><label>Última atualização<input id="lastUpdated" type="date"></label><label><span>Produto ativo</span><input id="active" type="checkbox" checked></label><div class="btns"><button type="submit">Salvar produto</button><button type="button" class="secondary" id="remove">Excluir</button></div></form></section><section class="panel"><h2>Produtos <span id="count"></span></h2><div class="list" id="list"></div></section></main><script>let products=[],editing=null;const $=id=>document.getElementById(id);function render(){products.sort((a,b)=>(a.order||999)-(b.order||999));$('count').textContent='('+products.length+')';$('list').innerHTML=products.map(p=>`<div class="item"><div><b>${p.name}</b><br><small>${p.category} • R$ ${Number(p.price||0).toFixed(2).replace('.',',')} • ${p.active===false?'Inativo':'Ativo'}</small></div><button onclick="edit(${p.id})">Editar</button></div>`).join('')}function edit(id){let p=products.find(x=>x.id===id);editing=id;for(let k of ['id','name','description','category','price','oldPrice','rating','order','badge','image','link','lastUpdated'])$(k).value=p[k]??'';$('active').checked=p.active!==false;scrollTo({top:0,behavior:'smooth'})}function clear(){editing=null;$('form').reset();$('active').checked=true;$('lastUpdated').value=new Date().toISOString().slice(0,10)}$('file').onchange=async e=>{products=JSON.parse(await e.target.files[0].text());render();clear()};$('form').onsubmit=e=>{e.preventDefault();let p={id:editing||Math.max(0,...products.map(x=>+x.id))+1,name:$('name').value,description:$('description').value,category:$('category').value,price:+$('price').value,oldPrice:+$('oldPrice').value,rating:+$('rating').value,badge:$('badge').value,image:$('image').value,link:$('link').value,active:$('active').checked,order:+$('order').value,lastUpdated:$('lastUpdated').value};let i=products.findIndex(x=>x.id===p.id);i>-1?products[i]=p:products.push(p);render();clear()};$('remove').onclick=()=>{if(editing&&confirm('Excluir produto?')){products=products.filter(x=>x.id!==editing);render();clear()}};$('new').onclick=clear;$('export').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(products,null,2)],{type:'application/json'}));a.download='products.json';a.click();URL.revokeObjectURL(a.href)};clear();render();</script></body></html>
